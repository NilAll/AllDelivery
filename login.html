<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lojista</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .login-box h2 { color: #2f3542; margin-top: 0; margin-bottom: 20px; font-size: 1.5em; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        
        /* Botões padronizados */
        .btn-entrar { width: 100%; background: #ff4757; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-entrar:hover { background: #ff6b81; }
        
        .btn-voltar { display: block; width: 100%; background: #f1f2f6; color: #2f3542; text-decoration: none; padding: 12px; border-radius: 6px; font-size: 1em; font-weight: bold; box-sizing: border-box; transition: 0.2s; }
        .btn-voltar:hover { background: #dfe4ea; }

        #mensagem { margin-bottom: 15px; font-size: 0.9em; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Acesso do Lojista</h2>
        <input type="email" id="email" placeholder="Seu E-mail">
        <input type="password" id="senha" placeholder="Sua Senha">
        
        <div id="mensagem"></div>

        <button class="btn-entrar" onclick="fazerLogin()">Entrar</button>
        <a href="landing.html" class="btn-voltar">Voltar para o Mural</a>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://eyslsyyctmokrbuwoprk.supabase.co';
        const supabaseKey = 'sb_publishable_t9cAvHh2w-VWP3zxwSndmA_x0FPqsM1';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;
            const msg = document.getElementById('mensagem');

            if (!email || !password) {
                msg.innerText = "Preencha e-mail e senha.";
                msg.style.color = "#ff4757";
                return;
            }

            msg.innerText = "⏳ Verificando dados...";
            msg.style.color = "#747d8c";

            const { data, error } = await db.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                msg.innerText = "❌ E-mail ou senha incorretos.";
                msg.style.color = "#ff4757";
            } else {
                msg.innerText = "✅ Login com sucesso!";
                msg.style.color = "#2ed573";
                setTimeout(() => window.location.href = "admin.html", 1000);
            }
        }
    </script>
</body>
</html>
