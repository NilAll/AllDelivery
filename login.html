<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AllDelivery</title>
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding-top: 5vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; display: block; text-decoration: none; margin-bottom: 10px; }
        .btn-primary { background: #ff4757; color: white; }
        .btn-sec { background: #f1f2f6; color: #2f3542; }
        .btn-green { background: #2ed573; color: white; }
        .link-forgot { display: block; margin-top: 10px; font-size: 0.85em; color: #747d8c; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card" id="box-login">
        <h2>Acesso do Lojista</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <div id="msg" style="margin-bottom: 10px; font-weight: bold; font-size: 0.9em;"></div>
        <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
        <a href="javascript:void(0)" onclick="mostrarEsqueciSenha()" class="link-forgot">Esqueci minha senha</a>
        <a href="index.html" class="btn btn-sec">Voltar ao Mural</a>
    </div>

    <div class="card" id="box-reset" style="display: none;">
        <h2>Recuperar Senha</h2>
        <p style="font-size: 0.8em; color: #747d8c;">Digite seu e-mail para receber o link de redefinição.</p>
        <input type="email" id="email-reset" placeholder="E-mail cadastrado">
        <button class="btn btn-primary" onclick="recuperarSenha()">Enviar Link</button>
        <a href="javascript:void(0)" onclick="mostrarLogin()" class="link-forgot">Voltar para Login</a>
    </div>

    <div class="card">
        <p style="font-size: 0.9em; color: #747d8c;">Ainda não tem o seu cardápio?</p>
        <a href="#planos" class="btn btn-sec">Confira nossos Preços</a>
        <a href="cadastro.html" class="btn btn-green">Cadastrar Minha Loja</a>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://eyslsyyctmokrbuwoprk.supabase.co';
        const supabaseKey = 'sb_publishable_t9cAvHh2w-VWP3zxwSndmA_x0FPqsM1';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;
            const msg = document.getElementById('msg');
            msg.innerText = "⏳ Verificando...";

            const { data, error } = await db.auth.signInWithPassword({ email, password });

            if (error) {
                msg.innerText = "❌ E-mail ou senha incorretos.";
                msg.style.color = "#ff4757";
            } else {
                window.location.href = "admin.html";
            }
        }

        function mostrarEsqueciSenha() {
            document.getElementById('box-login').style.display = 'none';
            document.getElementById('box-reset').style.display = 'block';
        }

        function mostrarLogin() {
            document.getElementById('box-login').style.display = 'block';
            document.getElementById('box-reset').style.display = 'none';
        }

        async function recuperarSenha() {
            const email = document.getElementById('email-reset').value;
            if(!email) { alert("Digite o e-mail!"); return; }

            const { error } = await db.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/admin.html',
            });

            if (error) alert("Erro: " + error.message);
            else alert("Verifique sua caixa de entrada (e o spam)!");
        }
    </script>
</body>
</html>
